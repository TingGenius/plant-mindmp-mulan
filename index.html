<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木兰科 (Magnoliaceae) - 考研复习交互导图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background-color: #f0f4f2; }
        #mindmap { width: 100vw; height: 100vh; }

        /* ── 工具栏 ── */
        #toolbar {
            position: fixed; top: 14px; right: 16px; z-index: 900;
            display: flex; align-items: center; gap: 10px;
        }
        #toolbar label {
            display: flex; align-items: center; gap: 6px;
            background: #27ae60; color: #fff;
            padding: 7px 14px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
            transition: background .2s;
            white-space: nowrap;
        }
        #toolbar label:hover { background: #219150; }
        #toolbar label svg { flex-shrink: 0; }
        #folderInput { display: none; }
        #imgCount {
            background: #fff; color: #27ae60;
            border: 1.5px solid #27ae60;
            padding: 6px 12px; border-radius: 8px;
            font-size: 12px; font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            white-space: nowrap;
            display: none;
        }

        /* ── 弹窗遮罩 ── */
        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.45); z-index: 999;
            backdrop-filter: blur(2px);
        }

        /* ── 信息弹窗 ── */
        #infoModal {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(.96);
            width: min(480px, 92vw);
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,.25);
            z-index: 1000;
            overflow: hidden;
            opacity: 0;
            transition: opacity .22s ease, transform .22s ease;
        }
        #infoModal.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 弹窗头部 */
        #modalHeader {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            padding: 18px 22px 14px;
            display: flex; align-items: flex-start; justify-content: space-between;
        }
        #plantName {
            margin: 0; color: #fff;
            font-size: 20px; font-weight: 700;
            line-height: 1.3; flex: 1;
        }
        #closeBtn {
            background: rgba(255,255,255,.25); border: none;
            color: #fff; width: 28px; height: 28px;
            border-radius: 50%; cursor: pointer;
            font-size: 16px; line-height: 28px; text-align: center;
            flex-shrink: 0; margin-left: 10px; margin-top: 2px;
            transition: background .15s;
        }
        #closeBtn:hover { background: rgba(255,255,255,.45); }

        /* 弹窗主体 */
        #modalBody { padding: 18px 22px 22px; }

        /* 图片区域 */
        #imgWrapper {
            position: relative;
            width: 100%; height: 260px; /* 固定高度，作为缩放视口 */
            margin-bottom: 14px;
            border-radius: 10px;
            overflow: hidden;           /* 裁剪超出部分，防止撑爆弹窗 */
            background: #1a1a1a;        /* 深色背景衬托 contain 模式四边 */
            display: none;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        #imgWrapper.dragging { cursor: grabbing; }
        #plantImage {
            /* contain：完整显示，不裁剪任何部分 */
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            /* 变换原点设在左上角，方便 JS 计算鼠标位置对应的缩放中心 */
            transform-origin: 0 0;
            transform: translate(0px, 0px) scale(1);
            will-change: transform;
            pointer-events: none; /* 让鼠标事件由外层 wrapper 统一处理 */
        }
        #imgBadge {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,.5); color: #fff;
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            pointer-events: none;
        }
        /* 缩放提示角标 */
        #zoomHint {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,.45); color: #fff;
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            pointer-events: none;
            opacity: 0; transition: opacity .3s;
        }
        #imgWrapper:hover #zoomHint { opacity: 1; }
        /* 无图占位 */
        #noImgPlaceholder {
            display: none;
            width: 100%; padding: 18px 0;
            text-align: center; color: #aaa; font-size: 13px;
            border: 1.5px dashed #d0d0d0; border-radius: 10px;
            margin-bottom: 14px;
        }
        #noImgPlaceholder svg { display: block; margin: 0 auto 6px; }

        /* 特征描述 */
        #plantDesc {
            color: #333; line-height: 1.9; font-size: 14.5px;
            margin: 0;
            background: #f8fdf9;
            border-left: 3px solid #27ae60;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
        }

        /* 使用提示 */
        #tipBar {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,.62); color: #fff;
            font-size: 12px; padding: 6px 16px;
            border-radius: 20px; z-index: 800;
            pointer-events: none; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="mindmap"></div>

<!-- 工具栏：文件夹导入 -->
<div id="toolbar">
    <span id="imgCount">📷 已载入 <b id="imgCountNum">0</b> 张图片</span>
    <label title="选择存放植物图片的文件夹（支持 jpg/png/webp 等格式，文件名须为植物中文名）">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        导入图片文件夹
        <input type="file" id="folderInput" webkitdirectory multiple accept="image/*">
    </label>
</div>

<!-- 提示条 -->
<div id="tipBar">点击节点查看详细特征 · 点击左上角展开/折叠子节点</div>

<!-- 遮罩 -->
<div id="overlay" onclick="closeModal()"></div>

<!-- 弹窗 -->
<div id="infoModal">
    <div id="modalHeader">
        <h2 id="plantName">植物名称</h2>
        <button id="closeBtn" onclick="closeModal()" title="关闭">✕</button>
    </div>
    <div id="modalBody">
        <!-- 图片区 -->
        <div id="imgWrapper">
            <img id="plantImage" src="" alt="植物图片">
            <span id="imgBadge">📷 植物图鉴</span>
            <span id="zoomHint">🔍 滚轮缩放 · 拖拽平移</span>
        </div>
        <!-- 无图占位 -->
        <div id="noImgPlaceholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            暂无图片 · 请将 <code style="background:#eee;padding:1px 5px;border-radius:3px">植物名.jpg/png</code> 放入 <code style="background:#eee;padding:1px 5px;border-radius:3px">images/</code> 文件夹
        </div>
        <!-- 特征文字 -->
        <p id="plantDesc"></p>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  1. 图片加载核心逻辑
// ════════════════════════════════════════════════════════════

/**
 * 方案A：相对路径自动拼接
 * 按 jpg → jpeg → png → webp → gif 顺序依次尝试，全部失败则隐藏图片
 */
var IMG_DIR = './images/';                // 本地图片文件夹相对路径（可按需修改）
var IMG_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif'];

/**
 * 方案B：文件夹导入缓存
 * key = 植物中文名（小写/trim），value = ObjectURL 字符串
 */
var importedImages = {};   // { "玉兰": "blob:xxx", ... }
var importedCount  = 0;

/** 主入口：为弹窗设置图片 */
function setModalImage(rawName) {
    var name = rawName.replace(/\n/g, ' ').trim();
    var imgEl      = document.getElementById('plantImage');
    var wrapperEl  = document.getElementById('imgWrapper');
    var placeholderEl = document.getElementById('noImgPlaceholder');

    // 先重置状态
    imgEl.src = '';
    imgEl.style.display = 'none';
    wrapperEl.style.display = 'none';
    placeholderEl.style.display = 'none';

    // 优先用 方案B 导入的图片
    var key = name.trim().toLowerCase();
    if (importedImages[key]) {
        imgEl.src = importedImages[key];
        imgEl.style.display = 'block';
        wrapperEl.style.display = 'block';
        return;
    }

    // 其次尝试 方案A 相对路径（多格式回退）
    tryRelativePath(imgEl, wrapperEl, placeholderEl, name, 0);
}

function tryRelativePath(imgEl, wrapperEl, placeholderEl, name, extIdx) {
    if (extIdx >= IMG_EXTS.length) {
        // 所有格式都失败 → 显示占位
        placeholderEl.style.display = 'block';
        return;
    }
    var src = IMG_DIR + name + '.' + IMG_EXTS[extIdx];
    imgEl.onload = function () {
        imgEl.style.display = 'block';
        wrapperEl.style.display = 'block';
    };
    imgEl.onerror = function () {
        tryRelativePath(imgEl, wrapperEl, placeholderEl, name, extIdx + 1);
    };
    imgEl.src = src;
}


// ════════════════════════════════════════════════════════════
//  2. 文件夹导入（方案B）
// ════════════════════════════════════════════════════════════
document.getElementById('folderInput').addEventListener('change', function (e) {
    var files = e.target.files;
    // 释放上一次的 ObjectURL
    Object.values(importedImages).forEach(URL.revokeObjectURL);
    importedImages = {};
    importedCount  = 0;

    var imageExts = new Set(['jpg','jpeg','png','webp','gif','bmp']);
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var parts = f.name.split('.');
        var ext = parts.pop().toLowerCase();
        if (!imageExts.has(ext)) continue;
        var nameKey = parts.join('.').trim().toLowerCase(); // 去掉扩展名，作为 key
        importedImages[nameKey] = URL.createObjectURL(f);
        importedCount++;
    }

    var countEl = document.getElementById('imgCount');
    var numEl   = document.getElementById('imgCountNum');
    numEl.textContent = importedCount;
    countEl.style.display = importedCount > 0 ? 'block' : 'none';

    if (importedCount > 0) {
        showToast('✅ 成功载入 ' + importedCount + ' 张图片！');
    } else {
        showToast('⚠️ 未找到图片文件，请确认文件夹内含 jpg/png 等图片');
    }
});


// ════════════════════════════════════════════════════════════
//  3. 图片缩放 & 拖拽（原生 JS，无第三方库）
// ════════════════════════════════════════════════════════════
var MAX_SCALE = 4;    // 最大放大倍数
var imgScale  = 1;
var imgTx     = 0;
var imgTy     = 0;
var isDragging   = false;
var dragStartX   = 0;
var dragStartY   = 0;
var dragStartTx  = 0;
var dragStartTy  = 0;

var imgEl      = document.getElementById('plantImage');
var wrapperEl2 = document.getElementById('imgWrapper');

/** 将当前 scale / tx / ty 应用到图片元素 */
function applyImgTransform() {
    imgEl.style.transform =
        'translate(' + imgTx + 'px, ' + imgTy + 'px) scale(' + imgScale + ')';
}

/** 重置缩放状态为初始（scale=1, 居中） */
function resetImgTransform() {
    imgScale = 1; imgTx = 0; imgTy = 0;
    isDragging = false;
    applyImgTransform();
    wrapperEl2.classList.remove('dragging');
}

/**
 * 计算平移边界，防止 scale>1 时图片边缘飞出视口。
 * 逻辑：图片经过 translate(tx,ty) scale(s) 后，
 * 其在视口中的实际尺寸为 (w*s, h*s)，
 * 限制使图片至少有一半覆盖视口（松散约束，更自然）。
 */
function clampTranslation(tx, ty, scale) {
    var w = wrapperEl2.clientWidth;
    var h = wrapperEl2.clientHeight;
    var scaledW = w * scale;
    var scaledH = h * scale;
    // 允许的最大/最小偏移：保证图片始终覆盖视口中心
    var minTx = w - scaledW;   // 图片右边贴视口右边
    var minTy = h - scaledH;
    var maxTx = 0;              // 图片左边贴视口左边
    var maxTy = 0;
    return {
        tx: Math.min(maxTx, Math.max(minTx, tx)),
        ty: Math.min(maxTy, Math.max(minTy, ty))
    };
}

// 滚轮缩放
wrapperEl2.addEventListener('wheel', function (e) {
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    var newScale = Math.min(MAX_SCALE, Math.max(1, imgScale * factor));
    if (newScale === imgScale) return;

    // 以鼠标在 wrapper 内的位置为缩放中心
    var rect = wrapperEl2.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var mouseY = e.clientY - rect.top;

    // 保持鼠标下方的图片点不动：
    // 鼠标对应图片上的点 = (mouseX - tx) / scale
    // 新 tx = mouseX - 该点 * newScale
    var newTx = mouseX - (mouseX - imgTx) * (newScale / imgScale);
    var newTy = mouseY - (mouseY - imgTy) * (newScale / imgScale);

    imgScale = newScale;
    var clamped = clampTranslation(newTx, newTy, imgScale);
    imgTx = clamped.tx; imgTy = clamped.ty;
    applyImgTransform();

    // scale 回到 1 时重置拖拽光标
    wrapperEl2.style.cursor = imgScale > 1 ? 'grab' : 'default';
}, { passive: false });

// 拖拽开始
wrapperEl2.addEventListener('mousedown', function (e) {
    if (imgScale <= 1) return;     // 未放大时不可拖拽
    e.preventDefault();
    isDragging = true;
    dragStartX  = e.clientX;
    dragStartY  = e.clientY;
    dragStartTx = imgTx;
    dragStartTy = imgTy;
    wrapperEl2.classList.add('dragging');
});

// 拖拽移动（监听 document，防止鼠标移出 wrapper 后丢失事件）
document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    var clamped = clampTranslation(dragStartTx + dx, dragStartTy + dy, imgScale);
    imgTx = clamped.tx; imgTy = clamped.ty;
    applyImgTransform();
});

// 拖拽结束
document.addEventListener('mouseup', function () {
    if (!isDragging) return;
    isDragging = false;
    wrapperEl2.classList.remove('dragging');
});

// 触控支持（平板/手机）
var touchStartDist = 0, touchStartScale = 1;
var touchStartTx = 0, touchStartTy = 0;
var touchMidX = 0, touchMidY = 0;
wrapperEl2.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
        e.preventDefault();
        touchStartDist  = Math.hypot(
            e.touches[1].clientX - e.touches[0].clientX,
            e.touches[1].clientY - e.touches[0].clientY);
        touchStartScale = imgScale;
        touchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - wrapperEl2.getBoundingClientRect().left;
        touchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - wrapperEl2.getBoundingClientRect().top;
        touchStartTx = imgTx; touchStartTy = imgTy;
    } else if (e.touches.length === 1 && imgScale > 1) {
        dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
        dragStartTx = imgTx; dragStartTy = imgTy; isDragging = true;
    }
}, { passive: false });
wrapperEl2.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (e.touches.length === 2) {
        var dist = Math.hypot(
            e.touches[1].clientX - e.touches[0].clientX,
            e.touches[1].clientY - e.touches[0].clientY);
        var newScale = Math.min(MAX_SCALE, Math.max(1, touchStartScale * dist / touchStartDist));
        var newTx = touchMidX - (touchMidX - touchStartTx) * (newScale / touchStartScale);
        var newTy = touchMidY - (touchMidY - touchStartTy) * (newScale / touchStartScale);
        imgScale = newScale;
        var c = clampTranslation(newTx, newTy, imgScale);
        imgTx = c.tx; imgTy = c.ty; applyImgTransform();
    } else if (e.touches.length === 1 && isDragging) {
        var dx = e.touches[0].clientX - dragStartX;
        var dy = e.touches[0].clientY - dragStartY;
        var c = clampTranslation(dragStartTx + dx, dragStartTy + dy, imgScale);
        imgTx = c.tx; imgTy = c.ty; applyImgTransform();
    }
}, { passive: false });
wrapperEl2.addEventListener('touchend', function () { isDragging = false; });


// ════════════════════════════════════════════════════════════
//  4. 弹窗控制（含状态重置）
// ════════════════════════════════════════════════════════════
function openModal(name, desc) {
    resetImgTransform();                                       // ← 重置缩放状态
    document.getElementById('plantName').innerText = name.replace(/\n/g, ' ');
    document.getElementById('plantDesc').innerText  = desc;
    setModalImage(name);

    document.getElementById('overlay').style.display   = 'block';
    document.getElementById('infoModal').style.display = 'block';
    requestAnimationFrame(function () {
        requestAnimationFrame(function () {
            document.getElementById('infoModal').classList.add('show');
        });
    });
}

function closeModal() {
    var modal = document.getElementById('infoModal');
    modal.classList.remove('show');
    setTimeout(function () {
        modal.style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        resetImgTransform();                                   // ← 关闭后也重置
    }, 220);
}

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
});


// ════════════════════════════════════════════════════════════
//  5. Toast 提示
// ════════════════════════════════════════════════════════════
function showToast(msg) {
    var tip = document.getElementById('tipBar');
    tip.textContent = msg;
    clearTimeout(tip._timer);
    tip._timer = setTimeout(function () {
        tip.textContent = '点击节点查看详细特征 · 点击左上角展开/折叠子节点';
    }, 3000);
}


// ════════════════════════════════════════════════════════════
//  6. ECharts 思维导图
// ════════════════════════════════════════════════════════════
var myChart = echarts.init(document.getElementById('mindmap'));

var plantData = {
    name: '木兰科\nMagnoliaceae',
    plantInfo: '核心识别特征：乔木或灌木，稀藤本，常绿或落叶；单叶互生，全缘（稀浅裂或有齿），托叶有或无；花两性或单性，各部分多为螺旋状排列于伸长的花托上；果实常为聚合蓇葖果，稀为带翅坚果。',
    children: [
        {
            name: '木兰属',
            plantInfo: '属核心特征：叶全缘；托叶与叶柄相连并包裹嫩芽，脱落后在枝上留下环状托叶痕；花顶生；雌蕊群无柄；每心皮具 2 胚珠。',
            children: [
                { name: '玉兰', plantInfo: '落叶乔木；先花后叶；花被片 9-12 片，大小近似，不呈萼片状，纯白色；花药侧向或内侧向开裂。' },
                { name: '二乔玉兰', plantInfo: '落叶小乔木（杂交种）；先花后叶；花被片大小近似，外面淡紫或红色，内面白色，外轮较内轮为短。' },
                { name: '宝华玉兰', plantInfo: '落叶乔木；先花后叶；叶倒卵状长圆形，叶端短突尖；花被片近匙形或倒披针形，白色，中下部淡紫红色。' },
                { name: '天目木兰', plantInfo: '落叶乔木；先花后叶；叶宽倒披针形，端渐尖状；花被片红或淡红色。' },
                { name: '武当木兰', plantInfo: '落叶乔木；先花后叶；花被片 12-14 片，玫瑰红色，具紫色纵纹。' },
                { name: '紫玉兰/辛夷', plantInfo: '落叶大灌木；花叶同放或先花后叶；叶基下延，托叶痕长达叶柄 1/2；花被片外轮萼片状，常早落，内轮紫色或紫红色。' },
                { name: '望春玉兰', plantInfo: '落叶乔木；先花后叶；叶基不下延，托叶痕短于叶柄 1/2；聚合果蓇葖分离，常有部分心皮不育而扭曲（弯曲）。' },
                { name: '黄山木兰', plantInfo: '落叶乔木；先花后叶；外轮花被萼片状早落；聚合果蓇葖紧密结合不弯曲。' },
                { name: '厚朴', plantInfo: '落叶乔木；叶近轮生集于枝端；花叶同放；托叶痕长为叶柄 1/3-2/3 或近全长；叶端具短尖或钝圆；花直立。' },
                { name: '凹叶厚朴', plantInfo: '落叶乔木；特征与厚朴相似，但叶端显著凹入呈浅 2 裂片状。' },
                { name: '西康玉兰/龙女花', plantInfo: '落叶小乔木；小枝紫红色；叶背密被银灰色平伏长柔毛；花盛开时下垂。' },
                { name: '天女花', plantInfo: '落叶小乔木；小枝初被银灰色平伏长柔毛；叶背具褐色及白色毛及散生金黄色腺点；花盛开时略弯曲。' },
                { name: '山玉兰', plantInfo: '常绿乔木；托叶痕近于叶柄全长；叶卵形至椭圆形（长 10-32cm）；花梗直立。' },
                { name: '夜香木兰/夜合花', plantInfo: '常绿小乔木或灌木；叶柄短（0.5-1cm）；托叶痕达叶柄顶端；花梗弯曲，花球形，夜晚极香。' },
                { name: '广玉兰', plantInfo: '常绿乔木；叶柄无托叶痕；叶背有铁锈色短柔毛；花极大（径 15-20cm）；聚合果径 4-5cm。' }
            ]
        },
        {
            name: '木莲属',
            plantInfo: '属核心特征：常绿（罕落叶）乔木；花顶生；雌蕊群无柄；每心皮有胚珠 4 或更多；托叶与叶柄连生，具托叶痕。',
            children: [
                { name: '木莲', plantInfo: '叶常绿，厚革质，叶缘稍内卷；外轮花被片长圆状椭圆形。' },
                { name: '海南木莲', plantInfo: '叶常绿，薄革质，叶缘波状；外轮花被片倒卵形。' }
            ]
        },
        {
            name: '华盖木属',
            plantInfo: '属核心特征：常绿大乔木；单花顶生；雌蕊群具短柄；托叶与叶柄离生，叶柄无托叶痕。',
            children: [
                { name: '华盖木', plantInfo: '为单种属，干基具板根；花被 9 片，外轮最大。' }
            ]
        },
        {
            name: '含笑属',
            plantInfo: '属核心特征：常绿乔木或灌木；花腋生；雌蕊群显具柄，心皮上部分离且部分不发育，聚合果常疏散成穗状。',
            children: [
                { name: '白兰花', plantInfo: '托叶与叶柄合生有托叶痕，痕仅达柄长的 1/4-1/3；叶落革质，叶缘平展或略波状；花白色。' },
                { name: '黄兰', plantInfo: '托叶痕长达柄长 2/3 以上；叶落革质，缘显著呈波状；花淡酪黄色。' },
                { name: '多花含笑', plantInfo: '有托叶痕；叶革质，网脉密，叶在中部以下最宽，叶端尾状渐尖；花被片 11-13。' },
                { name: '峨眉含笑', plantInfo: '有托叶痕；叶革质，在中部以上最宽；叶背具淡褐色或白色平伏毛。' },
                { name: '川含笑', plantInfo: '有托叶痕；叶在中部以上最宽；叶背是红褐色或直生毛。' },
                { name: '含笑', plantInfo: '有托叶痕；叶柄极短（5mm 以下）；花被片 6 片，2 轮，淡黄色，边缘常带紫色。' },
                { name: '苦梓含笑', plantInfo: '托叶与叶柄离生，无托叶痕；花被片 6（罕 8）；小枝、叶柄、叶背、花梗均密生褐色绒毛。' },
                { name: '乐昌含笑', plantInfo: '无托叶痕；花被片 6（罕 8）；小枝无毛；芽、叶背具平伏短毛。' },
                { name: '火力楠', plantInfo: '无托叶痕；花被片 9-12；叶的中部或中部以上最宽，侧脉 10-15 对，叶背具平伏微毛。' },
                { name: '亮叶含笑', plantInfo: '无托叶痕；叶中部以下最宽，叶基两侧对称；花被片白色长约 3cm，雄蕊药隔不伸出。' },
                { name: '金叶含笑', plantInfo: '无托叶痕；叶中部以下最宽，叶基两侧不对称；花被片乳黄色长 6-7cm，雄蕊药隔凸出长约 2mm。' },
                { name: '深山含笑', plantInfo: '无托叶痕；叶背粉绿色或具白粉，网脉密；无毛或仅中脉具毛；花被 9 片，白色。' },
                { name: '台湾含笑', plantInfo: '无托叶痕；叶背绿色无白粉，网脉稀疏；花被 12 片，淡黄色。' }
            ]
        },
        {
            name: '观光木属',
            plantInfo: '属核心特征：常绿乔木；花腋生；雌蕊群具柄；心皮合生且全部发育，聚合果呈厚木质不弯曲的椭圆形。',
            children: [
                { name: '观光木', plantInfo: '中国特有单种属；托叶痕约达柄长 1/2；花被片 9，具红色小斑点；成熟时蓇葖裂成 2 瓣，悬垂红色假种皮种子。' }
            ]
        },
        {
            name: '鹅掌楸属',
            plantInfo: '属核心特征：落叶乔木；叶有裂片（马褂形）；花单生枝顶；果为由聚合带翅坚果组成的纺锤形果序。',
            children: [
                { name: '鹅掌楸', plantInfo: '叶两侧通常 1 裂，向中部凹入较深；老叶背面有乳头状白粉点；花丝短（约 0.5cm），花外面绿色较多。' },
                { name: '美国鹅掌楸', plantInfo: '叶两侧各有 1-2(3) 裂，不向中部凹入；老叶背面无白粉；花丝长 1-1.2cm；花瓣内方近基部有显著的火焰状橙黄色斑。' }
            ]
        }
    ]
};

var option = {
    tooltip: { trigger: 'item', triggerOn: 'mousemove', formatter: '{b}' },
    series: [
        {
            type: 'tree',
            data: [plantData],
            top: '5%', bottom: '5%', left: '12%', right: '22%',
            symbolSize: 10,
            symbol: 'circle',
            initialTreeDepth: 2,
            lineStyle: { color: '#b2dfdb', width: 1.5, curveness: 0.5 },
            itemStyle: { color: '#27ae60', borderColor: '#1e8449', borderWidth: 1.5 },
            label: {
                position: 'left', verticalAlign: 'middle', align: 'right',
                fontSize: 14, fontWeight: 'bold', color: '#2c3e50',
                fontFamily: '"Microsoft YaHei", "PingFang SC", sans-serif'
            },
            leaves: {
                label: {
                    position: 'right', verticalAlign: 'middle', align: 'left',
                    fontWeight: 'normal', fontSize: 13, color: '#34495e'
                },
                itemStyle: { color: '#52be80', borderColor: '#27ae60' }
            },
            emphasis: {
                itemStyle: { color: '#f39c12', borderColor: '#e67e22' },
                label: { color: '#c0392b' }
            },
            expandAndCollapse: true,
            animationDuration: 550,
            animationDurationUpdate: 750
        }
    ]
};
myChart.setOption(option);

// 点击节点弹窗
myChart.on('click', function (params) {
    if (params.data && params.data.plantInfo) {
        openModal(params.data.name, params.data.plantInfo);
    }
});

window.addEventListener('resize', function () { myChart.resize(); });

// 隐藏提示条
setTimeout(function () {
    var tip = document.getElementById('tipBar');
    tip.style.transition = 'opacity 1s';
    tip.style.opacity = '0';
    setTimeout(function () { tip.style.display = 'none'; }, 1000);
}, 5000);
</script>
</body>
</html>
